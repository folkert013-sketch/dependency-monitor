<div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
    <form hx-post="{% url 'dashboard:team_update' team.slug %}" hx-target="#team-header" hx-swap="innerHTML">
        {% csrf_token %}
        <div class="flex items-start justify-between mb-4">
            <div class="flex-1 mr-4">
                <input type="text" name="name" value="{{ team.name }}" required
                       class="text-2xl font-bold text-gray-900 bg-transparent border-0 border-b-2 border-transparent focus:border-indigo-500 focus:ring-0 w-full p-0 pb-1">
            </div>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition-colors flex-shrink-0">
                Opslaan
            </button>
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Beschrijving</label>
                <textarea name="description" rows="3" placeholder="Beschrijf wat dit team doet..."
                          class="w-full text-sm rounded-lg border-gray-300 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ team.description }}</textarea>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Proces</label>
                <select name="process" class="w-full text-sm rounded-lg border-gray-300 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="sequential" {% if team.process == "sequential" %}selected{% endif %}>Sequential — taken worden na elkaar uitgevoerd</option>
                    <option value="hierarchical" {% if team.process == "hierarchical" %}selected{% endif %}>Hierarchical — manager-agent verdeelt taken</option>
                </select>
                <p class="text-xs text-gray-400 mt-2">
                    <span class="font-medium">Slug:</span> {{ team.slug }} &middot;
                    <span class="font-medium">Aangemaakt:</span> {{ team.created_at|date:"d M Y" }}
                </p>
            </div>
        </div>
    </form>
</div>
