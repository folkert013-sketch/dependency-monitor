<div id="categories-section" class="mb-8">
    <div class="bg-white rounded-2xl border border-gray-200/60 p-6 shadow-sm">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
            Categorieën
        </h2>

        {% if categories %}
        <div class="space-y-2 mb-4">
            {% for cat in categories %}
            <div class="flex items-center gap-3 group" id="cat-row-{{ cat.pk }}">
                <!-- Display mode -->
                <div class="flex items-center gap-3 flex-1 cat-display">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-{{ cat.color }}-100 text-{{ cat.color }}-700">
                        {{ cat.name }}
                    </span>
                    <span class="text-xs text-gray-400">{{ cat.templates.count }} template{{ cat.templates.count|pluralize }}</span>
                    <div class="ml-auto flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button type="button" onclick="toggleCatEdit({{ cat.pk }})" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Bewerken">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <form method="post"
                              hx-post="{% url 'dashboard:template_category_delete' cat.pk %}"
                              hx-target="#categories-section"
                              hx-swap="outerHTML"
                              hx-confirm="Categorie '{{ cat.name }}' verwijderen? Templates worden ongecategoriseerd.">
                            {% csrf_token %}
                            <button type="submit" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Verwijderen">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Edit mode (hidden by default) -->
                <form class="hidden flex-1 cat-edit"
                      hx-post="{% url 'dashboard:template_category_edit' cat.pk %}"
                      hx-target="#categories-section"
                      hx-swap="outerHTML">
                    {% csrf_token %}
                    <div class="flex items-center gap-2">
                        <input type="text" name="name" value="{{ cat.name }}" required
                               class="flex-1 rounded-lg border-gray-300 text-sm px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <select name="color" class="rounded-lg border-gray-300 text-sm px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 tomselect-skip">
                            {% for val, label in color_choices %}
                            <option value="{{ val }}" {% if cat.color == val %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                        <button type="submit" class="p-1.5 text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </button>
                        <button type="button" onclick="toggleCatEdit({{ cat.pk }})" class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </form>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-sm text-gray-400 mb-4">Nog geen categorieën.</p>
        {% endif %}

        <!-- Add form -->
        <form hx-post="{% url 'dashboard:template_category_add' %}"
              hx-target="#categories-section"
              hx-swap="outerHTML"
              class="flex items-center gap-2 pt-3 border-t border-gray-100">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Nieuwe categorie..." required
                   class="flex-1 rounded-lg border-gray-300 text-sm px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <select name="color" class="rounded-lg border-gray-300 text-sm px-3 py-1.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 tomselect-skip">
                {% for val, label in color_choices %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="inline-flex items-center gap-1 px-3 py-1.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Toevoegen
            </button>
        </form>
    </div>
</div>

<script>
function toggleCatEdit(pk) {
    var row = document.getElementById('cat-row-' + pk);
    if (!row) return;
    row.querySelector('.cat-display').classList.toggle('hidden');
    row.querySelector('.cat-edit').classList.toggle('hidden');
}
</script>
