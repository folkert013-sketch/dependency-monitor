{% if types %}
<table class="w-full text-sm">
    <thead>
        <tr class="border-b border-gray-100 bg-gray-50/50">
            <th class="text-left px-5 py-3 font-medium text-gray-500">Google type</th>
            <th class="text-left px-5 py-3 font-medium text-gray-500">Label</th>
            <th class="px-5 py-3"></th>
        </tr>
    </thead>
    <tbody>
        {% for bt in types %}
        <tr class="border-b border-gray-50 hover:bg-indigo-50/30 transition-colors">
            <td class="px-5 py-3 font-mono text-gray-700">{{ bt.google_type }}</td>
            <td class="px-5 py-3 text-gray-900">{{ bt.label }}</td>
            <td class="px-5 py-3 text-right">
                <button hx-post="{% url 'dashboard:htmx_business_type_delete' bt.pk %}"
                        hx-target="#business-type-list"
                        hx-swap="innerHTML"
                        hx-confirm="Weet je zeker dat je '{{ bt.label }}' wilt verwijderen?"
                        class="text-red-500 hover:text-red-700 text-xs font-medium transition-colors">
                    Verwijderen
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-gray-500 text-center py-8">Nog geen bedrijfstypes aangemaakt.</p>
{% endif %}
