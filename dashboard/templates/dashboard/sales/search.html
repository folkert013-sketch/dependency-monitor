{% extends "dashboard/base.html" %}

{% block title %}Bedrijven zoeken{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="{% url 'dashboard:sales_home' %}" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors">&larr; Terug naar Sales</a>
    <h1 class="text-3xl font-bold text-gray-900 mt-2">Bedrijven zoeken</h1>
    <p class="text-gray-500 mt-1">Zoek nieuwe bedrijven via Google Places of doorzoek bestaande prospects</p>
</div>

<div class="bg-white rounded-2xl border border-gray-200/60 p-6 shadow-sm mb-8">
    <!-- Zoekmodus tabs -->
    <div class="flex gap-2 mb-6">
        <button type="button" id="tab-category" onclick="setSearchMode('category')"
                class="px-4 py-2 text-sm font-medium rounded-xl transition-all bg-indigo-600 text-white shadow-sm">
            Categorie zoeken
        </button>
        <button type="button" id="tab-individual" onclick="setSearchMode('individual')"
                class="px-4 py-2 text-sm font-medium rounded-xl transition-all bg-gray-100 text-gray-600 hover:bg-gray-200">
            Individueel bedrijf
        </button>
        <button type="button" id="tab-internal" onclick="setSearchMode('internal')"
                class="px-4 py-2 text-sm font-medium rounded-xl transition-all bg-gray-100 text-gray-600 hover:bg-gray-200">
            Bestaande prospects
        </button>
    </div>

    <form id="search-form"
          hx-post="{% url 'dashboard:htmx_sales_search_results' %}"
          hx-target="#search-results"
          hx-swap="innerHTML"
          hx-indicator="#search-spinner"
          class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {% csrf_token %}
        <input type="hidden" name="search_mode" id="search-mode-input" value="category">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" id="query-label">Zoekterm</label>
            <input type="text" name="query" id="query-input" required placeholder="bijv. administratiekantoor" class="w-full rounded-xl border-gray-300 text-sm px-4 py-2.5 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div id="field-location">
            <label id="location-label" class="block text-sm font-medium text-gray-700 mb-1">Locatie / Stad</label>
            <input type="text" name="location" id="location-input" placeholder="bijv. Utrecht" class="w-full rounded-xl border-gray-300 text-sm px-4 py-2.5 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div id="field-radius">
            <label class="block text-sm font-medium text-gray-700 mb-1">Straal (km)</label>
            <input type="number" name="radius_km" value="10" min="1" max="50" class="w-full rounded-xl border-gray-300 text-sm px-4 py-2.5 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div id="field-group-slug">
            <label class="block text-sm font-medium text-gray-700 mb-1">Toevoegen aan groep</label>
            <select name="group_slug">
                <option value="">— Geen groep —</option>
                {% for group in groups %}
                <option value="{{ group.slug }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="field-max-results">
            <label class="block text-sm font-medium text-gray-700 mb-1">Max resultaten</label>
            <input type="number" name="max_results" id="max-results-input" value="20" min="1" max="20" class="w-full rounded-xl border-gray-300 text-sm px-4 py-2.5 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div id="field-min-rating">
            <label class="block text-sm font-medium text-gray-700 mb-1">Min. beoordeling</label>
            <select name="min_rating">
                <option value="">Alle</option>
                <option value="3.0">3.0+ sterren</option>
                <option value="3.5">3.5+ sterren</option>
                <option value="4.0">4.0+ sterren</option>
                <option value="4.5">4.5+ sterren</option>
            </select>
        </div>
        <div id="field-business-type">
            <label class="block text-sm font-medium text-gray-700 mb-1">Bedrijfstype</label>
            <select name="business_type">
                <option value="">Alle types</option>
                {% for bt in business_types %}
                <option value="{{ bt.google_type }}">{{ bt.label }}</option>
                {% endfor %}
            </select>
        </div>
        <!-- Internal search filters (hidden by default) -->
        <div id="field-filter-group" style="display:none">
            <label class="block text-sm font-medium text-gray-700 mb-1">Filter op groep</label>
            <select name="filter_group">
                <option value="">Alle groepen</option>
                {% for group in groups %}
                <option value="{{ group.slug }}">{{ group.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="field-filter-status" style="display:none">
            <label class="block text-sm font-medium text-gray-700 mb-1">Filter op status</label>
            <select name="filter_status">
                <option value="">Alle statussen</option>
                <option value="new">Nieuw</option>
                <option value="not_contacted">Niet benaderd</option>
                <option value="contacted">Benaderd</option>
                <option value="interested">Geïnteresseerd</option>
                <option value="not_interested">Geen interesse</option>
                <option value="client">Klant</option>
            </select>
        </div>
        <div class="sm:col-span-2 lg:col-span-4 flex items-center gap-3">
            <button type="submit" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white text-sm font-semibold rounded-xl hover:from-indigo-700 hover:to-indigo-800 transition-all shadow-lg shadow-indigo-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Zoeken
            </button>
            <span id="search-spinner" class="htmx-indicator">
                <svg class="animate-spin h-5 w-5 text-indigo-600" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            </span>
        </div>
    </form>
</div>

<div id="search-results"></div>
<div id="modal-container"></div>

<script>
const EXTERNAL_URL = "{% url 'dashboard:htmx_sales_search_results' %}";
const INTERNAL_URL = "{% url 'dashboard:htmx_internal_prospect_search' %}";

function setSearchMode(mode) {
    const isIndividual = mode === 'individual';
    const isInternal = mode === 'internal';
    document.getElementById('search-mode-input').value = mode;

    // Toggle tab styling
    const tabs = {category: 'tab-category', individual: 'tab-individual', internal: 'tab-internal'};
    const activeClass = 'px-4 py-2 text-sm font-medium rounded-xl transition-all bg-indigo-600 text-white shadow-sm';
    const inactiveClass = 'px-4 py-2 text-sm font-medium rounded-xl transition-all bg-gray-100 text-gray-600 hover:bg-gray-200';
    for (const [key, id] of Object.entries(tabs)) {
        document.getElementById(id).className = key === mode ? activeClass : inactiveClass;
    }

    // Google Places fields: hide for internal mode
    const googleFields = ['field-location', 'field-radius', 'field-min-rating', 'field-business-type', 'field-max-results', 'field-group-slug'];
    googleFields.forEach(function(id) {
        const el = document.getElementById(id);
        if (isInternal) {
            el.style.display = 'none';
        } else if (id === 'field-radius' || id === 'field-min-rating' || id === 'field-business-type' || id === 'field-max-results') {
            el.style.display = isIndividual ? 'none' : '';
        } else {
            el.style.display = '';
        }
    });

    // Internal filter fields: show only for internal mode
    ['field-filter-group', 'field-filter-status'].forEach(function(id) {
        document.getElementById(id).style.display = isInternal ? '' : 'none';
    });

    // Update query field
    const queryInput = document.getElementById('query-input');
    const queryLabel = document.getElementById('query-label');
    if (isInternal) {
        queryLabel.textContent = 'Zoek prospect';
        queryInput.placeholder = 'bijv. Bouwbedrijf Jansen';
        queryInput.removeAttribute('required');
    } else if (isIndividual) {
        queryLabel.textContent = 'Bedrijfsnaam';
        queryInput.placeholder = 'bijv. Deloitte';
        queryInput.setAttribute('required', '');
    } else {
        queryLabel.textContent = 'Zoekterm';
        queryInput.placeholder = 'bijv. administratiekantoor';
        queryInput.setAttribute('required', '');
    }

    // Update location field label/placeholder
    if (!isInternal) {
        const locLabel = document.getElementById('location-label');
        const locInput = document.getElementById('location-input');
        locLabel.textContent = isIndividual ? 'Plaats / Regio' : 'Locatie / Stad';
        locInput.placeholder = isIndividual ? 'bijv. Groningen' : 'bijv. Utrecht';
    }

    // Update max results default
    if (!isInternal) {
        document.getElementById('max-results-input').value = isIndividual ? '5' : '20';
    }

    // Switch form endpoint
    const form = document.getElementById('search-form');
    form.setAttribute('hx-post', isInternal ? INTERNAL_URL : EXTERNAL_URL);
    htmx.process(form);

    // Clear results when switching modes
    document.getElementById('search-results').innerHTML = '';
}
</script>
{% endblock %}
