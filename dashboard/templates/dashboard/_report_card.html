{% load report_filters %}

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
    <div class="flex items-center gap-4 mb-4">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold {{ report.status|status_bg }}">
            {{ report.get_status_display }}
        </span>
        <span class="text-sm text-gray-500">{{ report.created_at|date:"d M Y, H:i" }}</span>
    </div>
    <div class="grid grid-cols-3 gap-4 text-center text-sm">
        <div>
            <p class="text-2xl font-bold text-gray-900">{{ report.total_dependencies }}</p>
            <p class="text-gray-500">Dependencies</p>
        </div>
        <div>
            <p class="text-2xl font-bold text-red-600">{{ report.vulnerability_count }}</p>
            <p class="text-gray-500">Vulnerabilities</p>
        </div>
        <div>
            <p class="text-2xl font-bold text-amber-600">{{ report.outdated_count }}</p>
            <p class="text-gray-500">Verouderd</p>
        </div>
    </div>
</div>
