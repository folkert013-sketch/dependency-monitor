{% load report_filters %}

<div class="bg-white border-2 border-indigo-300 rounded-xl shadow-sm overflow-hidden" id="section-card-{{ section.key }}">
    <!-- Edit header -->
    <div class="px-6 py-4 border-b border-indigo-100 bg-indigo-50">
        <div class="flex items-center gap-3">
            <span class="flex items-center justify-center w-8 h-8 bg-indigo-200 text-indigo-700 rounded-lg text-sm font-bold">{{ section.order|add:1 }}</span>
            <h2 class="text-lg font-semibold text-indigo-900">Sectie bewerken</h2>
        </div>
    </div>

    <!-- Edit form -->
    <form hx-post="{% url 'dashboard:compliance_section_edit' section.key %}"
          hx-target="#section-card-{{ section.key }}"
          hx-swap="outerHTML">
        {% csrf_token %}
        <div class="px-6 py-4 space-y-4">
            <!-- Title -->
            <div>
                <label for="edit-title-{{ section.key }}" class="block text-sm font-medium text-gray-700 mb-1">Titel</label>
                <input type="text"
                       id="edit-title-{{ section.key }}"
                       name="title"
                       value="{{ section.title }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                       required>
            </div>

            <!-- Body -->
            <div>
                <label for="edit-body-{{ section.key }}" class="block text-sm font-medium text-gray-700 mb-1">Inhoud (markdown)</label>
                <textarea id="edit-body-{{ section.key }}"
                          name="body"
                          rows="12"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                          required>{{ section.body }}</textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="px-6 py-3 bg-gray-50 border-t border-gray-100 flex items-center gap-2">
            <button type="submit"
                    class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Opslaan
            </button>
            <button type="button"
                    hx-get="{% url 'dashboard:compliance_section_card' section.key %}"
                    hx-target="#section-card-{{ section.key }}"
                    hx-swap="outerHTML"
                    class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 rounded-lg transition-colors">
                Annuleren
            </button>
        </div>
    </form>
</div>
