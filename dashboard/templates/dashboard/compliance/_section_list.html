{% load report_filters %}

{% for section in sections %}
    {% include "dashboard/compliance/_section_card.html" with section=section %}
{% endfor %}

<!-- Add section form -->
<div class="bg-white border border-dashed border-gray-300 rounded-xl overflow-hidden" id="add-section-form">
    <details class="group">
        <summary class="px-6 py-4 cursor-pointer select-none flex items-center gap-2 text-gray-500 hover:text-indigo-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
            </svg>
            <span class="text-sm font-medium">Nieuwe sectie toevoegen</span>
        </summary>
        <form hx-post="{% url 'dashboard:compliance_section_add' %}"
              hx-target="#compliance-sections"
              hx-swap="innerHTML"
              class="px-6 pb-4 space-y-3">
            {% csrf_token %}
            {% if add_error %}
            <p class="text-sm text-red-600">{{ add_error }}</p>
            {% endif %}
            <div>
                <label for="new-section-title" class="block text-sm font-medium text-gray-700 mb-1">Titel</label>
                <input type="text" id="new-section-title" name="title"
                       placeholder="Bijv. Risicobeoordeling transacties"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                       required>
            </div>
            <div>
                <label for="new-section-body" class="block text-sm font-medium text-gray-700 mb-1">Inhoud (optioneel, markdown)</label>
                <textarea id="new-section-body" name="body" rows="4"
                          placeholder="Beschrijf de inhoud van deze sectie..."
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"></textarea>
            </div>
            <button type="submit"
                    class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                </svg>
                Toevoegen
            </button>
        </form>
    </details>
</div>
