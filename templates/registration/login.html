{% extends "dashboard/base.html" %}

{% block title %}Inloggen{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
            <div class="flex items-center justify-center gap-3 mb-6">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">Inloggen</h1>
            </div>

            {% if form.errors %}
            <div class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
                Ongeldige gebruikersnaam of wachtwoord.
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Gebruikersnaam</label>
                    <input type="text" name="username" id="id_username" autofocus required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm">
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Wachtwoord</label>
                    <input type="password" name="password" id="id_password" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors text-sm">
                </div>

                <button type="submit"
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-2.5 px-4 rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all shadow-md shadow-indigo-200 text-sm">
                    Inloggen
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
